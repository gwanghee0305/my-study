<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 에러페이지</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0000aa;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;

            
        }

        .title {
            font-weight: bold;
            font-size: 100%;
        }


    </style>
</head>
<body>

    <div class="title">
         <h1>404</h1>
    </div>

    <div class="subtitle">
        <h2>페이지를 찾을 수 없습니다!</h2>
    </div>

    <div class="content">
        <p>
            요청하신 페이지가 존재하지 않거나, 주소가 잘못 입력 되었습니다. <br>
            다시 시도하거나 홈으로 이동해주세요.
        </p>
    </div>

    <br>

    <div class="home">
        <p>
            홈으로 돌아가기
        </p>
    </div>
    </body>
</html>
